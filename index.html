<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday, Vincci 🌻</title>
<link href="https://fonts.googleapis.com/css2?family=Pinyon+Script&family=Great+Vibes&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}

html,body{
  font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",sans-serif;
  min-height:100vh;
  overflow-x:hidden;
  overflow-y:auto;
  /* matcha latte gradient — muted, warm, soft */
  background: #e8efe0;
  background-image:
    radial-gradient(ellipse 75% 60% at 10% 5%,  rgba(220,235,195,.9) 0%, transparent 65%),
    radial-gradient(ellipse 60% 70% at 90% 10%,  rgba(198,218,168,.75) 0%, transparent 60%),
    radial-gradient(ellipse 70% 55% at 50% 90%,  rgba(215,230,185,.8) 0%, transparent 60%),
    radial-gradient(ellipse 50% 60% at 5%  90%,  rgba(235,245,210,.85) 0%, transparent 55%),
    radial-gradient(ellipse 55% 50% at 95% 85%,  rgba(205,225,175,.7) 0%, transparent 55%);
}

/* very faint gingham lines */
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:
    repeating-linear-gradient(0deg, rgba(120,155,80,.06) 0,rgba(120,155,80,.06) 1px,transparent 1px,transparent 28px),
    repeating-linear-gradient(90deg,rgba(120,155,80,.06) 0,rgba(120,155,80,.06) 1px,transparent 1px,transparent 28px);
}

/* ── SCREENS ── */
.screen{
  position:relative;z-index:1;
  min-height:100vh;
  display:none;
  flex-direction:column;
  align-items:center;
  justify-content:flex-start;
  padding:2rem 1.1rem 5rem;
}
.screen.active{display:flex;animation:fadeIn .5s ease both;}
#s-lock{justify-content:center;}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}

/* ══ MATCHA GLASS — barely-there frosted card ══ */
.card{
  background:rgba(255,255,255,.62);
  backdrop-filter:blur(14px);
  -webkit-backdrop-filter:blur(14px);
  border:1px solid rgba(255,255,255,.82);
  border-radius:30px;
  box-shadow:
    0 1px 0 rgba(255,255,255,.95) inset,
    0 10px 36px rgba(100,130,60,.09),
    0 2px 8px  rgba(100,130,60,.06);
}

/* ══════════════════════
   SCREEN 1 — LOCK
══════════════════════ */
.lock-card{
  padding:2rem 1.6rem 1.8rem;
  max-width:340px;width:100%;
  text-align:center;position:relative;
}
.bouquet-wrap{
  position:relative;width:220px;height:220px;
  margin:0 auto 1.1rem;
}
.bouquet-glow{
  position:absolute;inset:-14px;border-radius:50%;
  background:radial-gradient(circle,rgba(185,210,120,.38) 0%,transparent 70%);
  animation:glowPulse 4s ease-in-out infinite;
  filter:blur(12px);
}
@keyframes glowPulse{0%,100%{opacity:.55;transform:scale(1);}50%{opacity:.9;transform:scale(1.06);}}
.bouquet-top{
  width:220px;height:220px;object-fit:cover;border-radius:50%;
  border:3px solid rgba(255,255,255,.88);
  box-shadow:0 6px 22px rgba(90,120,50,.16),0 2px 0 rgba(255,255,255,.95) inset;
  display:block;position:relative;z-index:1;
  animation:floatImg 5s ease-in-out infinite;
}
@keyframes floatImg{0%,100%{transform:translateY(0);}50%{transform:translateY(-7px);}}

.lock-title{
  font-size:1.25rem;color:#4a6535;
  font-weight:400;letter-spacing:.02em;margin-bottom:.12rem;
}
.lock-tagline{
  font-size:.68rem;color:#8aaa6a;
  letter-spacing:.12em;text-transform:uppercase;margin-bottom:.95rem;
}

/* slots */
.code-slots{display:flex;justify-content:center;gap:9px;margin:.8rem 0 .38rem;}
.slot{
  width:50px;height:52px;border-radius:13px;
  background:rgba(240,248,228,.7);
  border:1.5px solid rgba(160,195,110,.45);
  display:flex;align-items:center;justify-content:center;
  font-size:1.3rem;font-weight:600;color:#4a6535;
  transition:all .18s ease;
  box-shadow:0 2px 6px rgba(90,120,50,.07),0 1px 0 rgba(255,255,255,.95) inset;
}
.slot.filled{
  background:rgba(245,238,195,.75);
  border-color:rgba(190,148,30,.4);
  transform:scale(1.04);
  box-shadow:0 0 8px rgba(195,158,40,.18),0 1px 0 rgba(255,255,255,.95) inset;
}
.hint{font-size:.7rem;color:#96b472;margin-bottom:.85rem;font-style:italic;letter-spacing:.03em;}

/* numpad */
.numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;max-width:212px;margin:0 auto;}
.key{
  background:rgba(245,250,238,.72);
  border:1px solid rgba(165,200,115,.38);
  border-radius:13px;padding:.65rem 0;
  font-size:1.1rem;font-weight:400;color:#4a6535;
  cursor:pointer;user-select:none;
  box-shadow:0 2px 5px rgba(90,120,50,.06),0 1px 0 rgba(255,255,255,.95) inset;
  transition:background .12s,transform .1s;
}
.key:hover{background:rgba(255,255,255,.85);}
.key:active{transform:scale(.88);background:rgba(235,248,215,.9);}
.key.del{font-size:.95rem;color:#96b472;}
.key.zero{grid-column:2;}
.err-shake{animation:shake .38s ease;}
@keyframes shake{0%,100%{transform:translateX(0);}20%,60%{transform:translateX(-7px);}40%,80%{transform:translateX(7px);}}

/* access modal */
.modal-overlay{
  position:absolute;inset:0;
  background:rgba(210,230,185,.48);
  backdrop-filter:blur(10px);
  display:none;align-items:center;justify-content:center;
  border-radius:30px;z-index:10;
}
.modal-overlay.show{display:flex;animation:fadeIn .28s ease both;}
.modal-box{
  background:rgba(255,255,255,.75);
  backdrop-filter:blur(18px);
  border:1px solid rgba(255,255,255,.88);
  border-radius:22px;
  padding:1.5rem 1.4rem;text-align:center;
  box-shadow:0 10px 30px rgba(90,120,50,.12),0 1px 0 rgba(255,255,255,.95) inset;
  max-width:225px;
}
.modal-img{
  width:66px;height:66px;object-fit:cover;border-radius:50%;
  border:2.5px solid rgba(255,255,255,.9);
  box-shadow:0 4px 12px rgba(90,120,50,.16);
  margin:0 auto .5rem;display:block;
  animation:bounce 1.1s ease infinite alternate;
}
@keyframes bounce{from{transform:translateY(0);}to{transform:translateY(-7px);}}
.modal-title{font-size:.98rem;color:#4a6535;font-weight:500;margin-bottom:.18rem;}
.modal-sub{font-size:.72rem;color:#8aaa6a;margin-bottom:.85rem;font-style:italic;}
.proceed-btn{
  background:linear-gradient(135deg,#b8d870,#7aaa38);
  color:#2a3d0a;border:none;border-radius:50px;
  padding:.5rem 1.45rem;font-size:.86rem;font-weight:500;
  cursor:pointer;
  box-shadow:0 3px 10px rgba(100,150,40,.22);
  transition:transform .14s,box-shadow .14s;
}
.proceed-btn:hover{transform:translateY(-2px);box-shadow:0 5px 16px rgba(100,150,40,.3);}
.proceed-btn:active{transform:scale(.94);}

/* ══════════════════════
   SCREEN 2 — ENVELOPE
══════════════════════ */
#s-envelope{
  justify-content:flex-start;
  padding-top:2.4rem;padding-bottom:2.4rem;
  overflow-y:visible;
}
.env-wrap{
  display:flex;flex-direction:column;
  align-items:center;width:100%;max-width:375px;gap:.85rem;
}
.env-title{
  font-size:1.2rem;color:#4a6535;
  font-style:italic;font-weight:400;
  text-align:center;letter-spacing:.02em;
}

/* envelope */
.envelope{
  width:210px;height:150px;
  position:relative;cursor:pointer;flex-shrink:0;
  filter:drop-shadow(0 5px 14px rgba(90,120,50,.16));
  transition:transform .2s ease;
}
.envelope:hover{transform:scale(1.04) translateY(-2px);}
.env-body{
  position:absolute;inset:0;
  background:linear-gradient(145deg,rgba(190,220,148,.78),rgba(155,195,108,.68));
  border-radius:10px;
  border:1.5px solid rgba(255,255,255,.75);
  box-shadow:0 1px 0 rgba(255,255,255,.9) inset,0 5px 15px rgba(90,120,50,.12);
}
.env-flap-svg{
  position:absolute;top:0;left:0;
  transform-origin:top center;
  transition:transform .55s cubic-bezier(.4,0,.2,1);
}
.envelope.open .env-flap-svg{transform:rotateX(175deg);}
.env-seal{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:44px;height:44px;
  background:radial-gradient(circle at 35% 35%,#eece58,#c09010);
  border-radius:50%;
  border:2px solid rgba(255,255,255,.7);
  display:flex;align-items:center;justify-content:center;
  font-size:1.2rem;
  box-shadow:0 2px 8px rgba(160,120,10,.18),0 1px 0 rgba(255,255,255,.55) inset;
  transition:transform .2s;
}
.envelope:hover .env-seal{transform:translate(-50%,-50%) scale(1.1);}
.env-hint{font-size:.7rem;color:#8aaa6a;font-style:italic;text-align:center;letter-spacing:.03em;}

/* letter card */
.letter-card{
  border-radius:26px;
  padding:1.75rem 1.45rem 1.5rem;
  width:100%;text-align:center;
  display:none;
  animation:slideUp .55s ease both;
}
@keyframes slideUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
.letter-card.show{display:block;}

.bouquet-letter{
  width:92px;height:92px;object-fit:cover;border-radius:50%;
  border:2.5px solid rgba(255,255,255,.88);
  box-shadow:0 4px 16px rgba(90,120,50,.15),0 0 0 5px rgba(255,255,255,.32);
  margin:0 auto .7rem;display:block;
}
.hearts-row{font-size:.88rem;letter-spacing:.38rem;margin-bottom:.45rem;color:#e0a020;opacity:.85;}
.bday-heading{
  font-size:1.45rem;color:#4a6535;
  font-family:'Great Vibes',cursive;
  line-height:1.4;margin-bottom:.15rem;
}
.bday-name{
  font-size:2.7rem;color:#9a7410;
  font-weight:400;
  font-family:'Pinyon Script',cursive;
  display:block;
  text-shadow:0 2px 6px rgba(140,100,0,.12);
  letter-spacing:.02em;
}
.divider{
  display:flex;align-items:center;gap:.45rem;justify-content:center;margin:.65rem 0;
}
.divider::before,.divider::after{
  content:'';flex:1;height:1px;
  background:linear-gradient(to right,transparent,rgba(120,160,70,.28));
}
.divider::after{background:linear-gradient(to left,transparent,rgba(120,160,70,.28));}
.divider span{font-size:.95rem;}
.bday-msg{
  font-size:.86rem;color:#4e6838;
  line-height:1.85;font-style:italic;font-weight:400;
}
.bday-msg em{font-style:normal;color:#9a7410;}
.sig-block{
  margin-top:.9rem;padding-top:.8rem;
  border-top:1px solid rgba(120,160,70,.18);
  font-size:.76rem;color:#96b472;font-style:italic;
}
.sig-from{font-size:.9rem;color:#9a7410;margin-top:.1rem;}

.back-btn{
  background:rgba(255,255,255,.52);
  border:1px solid rgba(165,200,115,.38);
  border-radius:50px;padding:.4rem 1.2rem;
  font-size:.72rem;color:#6a8a48;
  cursor:pointer;
  box-shadow:0 1px 0 rgba(255,255,255,.95) inset;
  transition:background .13s,transform .12s;flex-shrink:0;
}
.back-btn:hover{background:rgba(255,255,255,.78);transform:translateY(-1px);}
.back-btn:active{transform:scale(.94);}


/* ── BIRTHDAY CAKE ── */
.cake-wrap{
  margin:1.2rem auto .4rem;
  display:flex;flex-direction:column;align-items:center;
  gap:0;
}
.cake-label{
  font-size:.72rem;color:#8aaa6a;font-style:italic;
  letter-spacing:.06em;margin-top:.5rem;
  font-family:-apple-system,sans-serif;
}
/* candle flames */
@keyframes flicker{
  0%,100%{transform:scaleX(1)   scaleY(1)    rotate(-1deg); opacity:1;}
  25%    {transform:scaleX(.85) scaleY(1.08) rotate(2deg);  opacity:.9;}
  50%    {transform:scaleX(1.1) scaleY(.92)  rotate(-2deg); opacity:.95;}
  75%    {transform:scaleX(.9)  scaleY(1.05) rotate(1deg);  opacity:.88;}
}
@keyframes flicker2{
  0%,100%{transform:scaleX(1)   scaleY(1)    rotate(1deg);  opacity:.92;}
  30%    {transform:scaleX(1.1) scaleY(.9)   rotate(-2deg); opacity:1;}
  60%    {transform:scaleX(.88) scaleY(1.1)  rotate(2deg);  opacity:.85;}
}
.flame      {transform-origin:50% 80%;animation:flicker  1.4s ease-in-out infinite;}
.flame.alt  {transform-origin:50% 80%;animation:flicker2 1.1s ease-in-out infinite;}
/* number glow */
@keyframes numGlow{
  0%,100%{opacity:1;}
  50%    {opacity:.75;}
}
.num-glow{animation:numGlow 2.2s ease-in-out infinite;}


/* ── MUSIC PLAYER ── */
.music-btn{
  position:fixed;
  bottom:1.4rem;right:1.4rem;
  width:48px;height:48px;
  border-radius:50%;
  background:rgba(255,255,255,.62);
  backdrop-filter:blur(14px);
  -webkit-backdrop-filter:blur(14px);
  border:1px solid rgba(255,255,255,.82);
  box-shadow:0 4px 16px rgba(100,130,60,.15),0 1px 0 rgba(255,255,255,.95) inset;
  display:none;
  align-items:center;justify-content:center;
  cursor:pointer;
  z-index:999;
  transition:transform .2s ease,box-shadow .2s ease;
  font-size:1.2rem;
}
.music-btn:hover{
  transform:scale(1.1);
  box-shadow:0 6px 22px rgba(100,130,60,.22),0 1px 0 rgba(255,255,255,.95) inset;
}
.music-btn:active{transform:scale(.93);}
.music-btn.visible{display:flex;}
@keyframes spinVinyl{
  from{transform:rotate(0deg);}
  to{transform:rotate(360deg);}
}
.music-btn.playing .music-icon{
  display:inline-block;
  animation:spinVinyl 3s linear infinite;
}
.music-note-ring{
  position:fixed;
  bottom:1.1rem;right:1.1rem;
  width:54px;height:54px;
  border-radius:50%;
  border:1.5px solid rgba(140,180,80,.35);
  z-index:998;
  display:none;
  animation:ringPulse 2s ease-in-out infinite;
  pointer-events:none;
}
.music-note-ring.visible{display:block;}
@keyframes ringPulse{
  0%,100%{transform:scale(1);opacity:.5;}
  50%{transform:scale(1.18);opacity:.15;}
}
.music-label{
  position:fixed;
  bottom:3.9rem;right:.7rem;
  font-size:.62rem;
  color:#8aaa6a;
  font-style:italic;
  font-family:-apple-system,sans-serif;
  text-align:center;
  letter-spacing:.04em;
  display:none;
  z-index:999;
  white-space:nowrap;
  background:rgba(255,255,255,.55);
  backdrop-filter:blur(8px);
  padding:.22rem .55rem;
  border-radius:20px;
  border:1px solid rgba(255,255,255,.8);
}
.music-label.visible{display:block;}

.confetti-sf{
  position:fixed;top:-60px;font-size:1.65rem;
  animation:fallDown linear forwards;pointer-events:none;z-index:9999;
}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0;}}
@keyframes fallDown{
  0%{transform:translateY(0) rotate(0deg);opacity:0;}
  10%{opacity:1;}85%{opacity:1;}
  100%{transform:translateY(105vh) rotate(360deg);opacity:0;}
}
</style>
<script data-goatcounter="https://jisu.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
</head>

<script>
const CODE="0617";
let entered="",opened=false;
function updateSlots(){
  for(let i=0;i<4;i++){
    const el=document.getElementById("d"+i);
    if(i<entered.length){el.textContent=entered[i];el.classList.add("filled");}
    else{el.textContent="🌻";el.classList.remove("filled");}
  }
}
function press(k){
  if(entered.length>=4)return;
  entered+=k;updateSlots();
  if(entered.length===4){
    setTimeout(()=>{
      if(entered===CODE)document.getElementById("access-modal").classList.add("show");
      else{
        const c=document.getElementById("lock-card");
        c.classList.add("err-shake");
        setTimeout(()=>c.classList.remove("err-shake"),400);
        entered="";updateSlots();
      }
    },200);
  }
}
function delKey(){entered=entered.slice(0,-1);updateSlots();}
function goEnvelope(){
  document.getElementById("s-lock").classList.remove("active");
  document.getElementById("access-modal").classList.remove("show");
  entered="";updateSlots();
  setTimeout(()=>document.getElementById("s-envelope").classList.add("active"),100);
}
function openEnvelope(){
  if(opened)return;opened=true;
  document.getElementById("envelope").classList.add("open");
  document.getElementById("env-hint").style.display="none";
  setTimeout(()=>{
    document.getElementById("letter").classList.add("show");
    launchConfetti();launchSparkles();startTypewriter();
  },580);
}
function goBack(){
  document.getElementById("s-envelope").classList.remove("active");
  opened=false;
  document.getElementById("envelope").classList.remove("open");
  document.getElementById("letter").classList.remove("show");
  const twEl=document.getElementById("bday-msg-typed"); if(twEl) twEl.innerHTML="";
  document.getElementById("env-hint").style.display="";
  setTimeout(()=>{window.scrollTo(0,0);document.getElementById("s-lock").classList.add("active");},100);
}
function launchConfetti(){
  const emojis=["🌻","🌻","✨","🍵","🌼","💛","🎉","🌿","💌","🌸"];
  let c=0;
  function drop(){
    if(c++>65)return;
    const el=document.createElement("div");
    el.className="confetti-sf";
    el.textContent=emojis[Math.floor(Math.random()*emojis.length)];
    el.style.left=(Math.random()*96+2)+"%";
    const dur=2.8+Math.random()*2.5;
    el.style.animationDuration=dur+"s";
    el.style.animationDelay=(Math.random()*1.3)+"s";
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),(dur+1.6)*1000);
    setTimeout(drop,85+Math.random()*120);
  }
  drop();
}
// ── TYPEWRITER ──
const TW_LINES = [
  {text:"On this beautiful day,", em:false},
  {text:"I hope you feel just how ", em:false},
  {text:"loved", em:true},
  {text:" you are. 🌸", em:false},
  {text:"\n\n", em:false},
  {text:"Wishing you mornings filled with warm matcha,", em:false},
  {text:"\n", em:false},
  {text:"afternoons bright like sunflowers,", em:false},
  {text:"\n", em:false},
  {text:"and evenings wrapped in ", em:false},
  {text:"joy", em:true},
  {text:" and laughter. ✨", em:false},
  {text:"\n\n", em:false},
  {text:"May every dream you carry in your heart", em:false},
  {text:"\n", em:false},
  {text:"bloom into something ", em:false},
  {text:"wonderful", em:true},
  {text:" this year.", em:false},
  {text:"\n\n", em:false},
  {text:"You deserve all the happiness", em:false},
  {text:"\n", em:false},
  {text:"the world has to offer, Vincci. 🌻💛", em:false},
];

function startTypewriter() {
  const el = document.getElementById("bday-msg-typed");
  if (!el) return;
  el.innerHTML = "";
  let lineIdx = 0, charIdx = 0;
  let currentSpan = null;

  function nextChar() {
    if (lineIdx >= TW_LINES.length) {
      // show cursor blink then remove
      const cur = document.createElement("span");
      cur.textContent = "|";
      cur.style.cssText = "color:#9a7410;animation:blink .8s step-end infinite;font-style:normal;";
      el.appendChild(cur);
      setTimeout(()=>cur.remove(), 2200);
      return;
    }
    const line = TW_LINES[lineIdx];
    if (line.text === "\n\n") {
      el.appendChild(document.createElement("br"));
      el.appendChild(document.createElement("br"));
      lineIdx++; charIdx = 0;
      setTimeout(nextChar, 38);
      return;
    }
    if (line.text === "\n") {
      el.appendChild(document.createElement("br"));
      lineIdx++; charIdx = 0;
      setTimeout(nextChar, 30);
      return;
    }
    if (charIdx === 0) {
      currentSpan = document.createElement(line.em ? "em" : "span");
      if (line.em) { currentSpan.style.cssText="font-style:normal;color:#9a7410;"; }
      el.appendChild(currentSpan);
    }
    if (charIdx < line.text.length) {
      currentSpan.textContent += line.text[charIdx];
      charIdx++;
      // emoji chars need a tiny extra delay
      const ch = line.text[charIdx-1];
      const isEmoji = ch.codePointAt(0) > 127;
      setTimeout(nextChar, isEmoji ? 60 : 36);
    } else {
      lineIdx++; charIdx = 0;
      setTimeout(nextChar, 32);
    }
  }
  setTimeout(nextChar, 420);
}

function launchSparkles(){
  let s=0;
  function spark(){
    if(s++>32)return;
    const el=document.createElement("div");
    el.className="confetti-sf";el.textContent="✨";
    el.style.left=(5+Math.random()*90)+"%";
    const dur=1.5+Math.random()*1.5;
    el.style.animationDuration=dur+"s";
    el.style.animationDelay=(Math.random()*1.8)+"s";
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),(dur+2)*1000);
    setTimeout(spark,180+Math.random()*280);
  }
  spark();
}
</script>

<audio id="bg-music" loop preload="none">
  <source src="saturn.mp3" type="audio/mpeg">
</audio>

<!-- floating play button -->
<div class="music-note-ring" id="music-ring"></div>
<div class="music-label" id="music-label">Saturn · SZA</div>
<button class="music-btn" id="music-btn" onclick="toggleMusic()" title="Play Saturn - SZA">
  <span class="music-icon" id="music-icon">🎵</span>
</button>

<script>
const audio = document.getElementById('bg-music');
const btn   = document.getElementById('music-btn');
const ring  = document.getElementById('music-ring');
const label = document.getElementById('music-label');
const icon  = document.getElementById('music-icon');
let playing = false;

// Fade in audio
audio.volume = 0;

// Prevent music stopping on scroll/visibility change
document.addEventListener('visibilitychange', function(){
  if(playing && document.hidden === false){
    audio.play().catch(()=>{});
  }
});


function showMusicBtn(){
  btn.classList.add('visible');
  ring.classList.add('visible');
  label.classList.add('visible');
}

function toggleMusic(){
  if(!playing){
    audio.play().then(()=>{
      playing = true;
      icon.textContent = '🎶';
      btn.classList.add('playing');
      fadeIn();
    }).catch(()=>{});
  } else {
    fadeOut(()=>{ audio.pause(); });
    playing = false;
    icon.textContent = '🎵';
    btn.classList.remove('playing');
  }
}

function fadeIn(){
  audio.volume = 0;
  let v = 0;
  const t = setInterval(()=>{
    v = Math.min(v + 0.04, 0.55);
    audio.volume = v;
    if(v >= 0.55) clearInterval(t);
  }, 120);
}

function fadeOut(cb){
  let v = audio.volume;
  const t = setInterval(()=>{
    v = Math.max(v - 0.05, 0);
    audio.volume = v;
    if(v <= 0){ clearInterval(t); if(cb) cb(); }
  }, 80);
}

// Show button when letter opens
const origOpen = window.openEnvelope;
window.openEnvelope = function(){
  origOpen && origOpen();
  setTimeout(showMusicBtn, 1200);
};

// Hide button when going back
const origBack = window.goBack;
window.goBack = function(){
  origBack && origBack();
  btn.classList.remove('visible','playing');
  ring.classList.remove('visible');
  label.classList.remove('visible');
  if(playing){ fadeOut(()=>{ audio.pause(); audio.currentTime=0; }); playing=false; icon.textContent='🎵'; }
};
</script>
